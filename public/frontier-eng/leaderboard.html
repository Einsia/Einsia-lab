<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <title>Frontier-Engineering Bench · Overall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/evolution.css">
  <link rel="stylesheet" href="css/tables.css">
</head>
<body class="evo-page">
  <nav>
    <div class="container nav-inner">
      <a href="index.html" class="nav-brand-wrap">
        <span class="nav-brand">Frontier-Engineering Bench</span>
        <span class="nav-tagline" data-i18n="navLeaderboard">Leaderboard</span>
      </a>
      <div class="nav-right">
        <span class="lang-switch evo-lang-switch">
          <button type="button" id="site-lang-zh" class="evo-lang-btn" aria-label="中文">中文</button>
          <button type="button" id="site-lang-en" class="evo-lang-btn" aria-label="English">English</button>
        </span>
        <ul>
          <li><a href="index.html" data-i18n="navHome">首页</a></li>
          <li><a href="evolution.html" data-i18n="navEvolution">Evolution</a></li>
          <li><a href="index.html#overall-section" data-i18n="navOverall">总榜</a></li>
          <li><a href="problem.html?id=1" data-i18n="navTasks">任务</a></li>
          <li><a href="contact.html" data-i18n="navContact">联系</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="content">
      <h1 data-i18n="overallTitle">总榜</h1>
      <p id="overall-desc" data-i18n="overallDesc">展示所有参与者/模型在各任务上的综合得分</p>
    </div>

    <div class="content">
      <div class="table-container">
        <table id="overall-table">
          <thead>
            <tr>
              <th class="sortable" data-sort="rank" data-i18n="rank">排名</th>
              <th class="sortable" data-sort="name" data-i18n="participant">参与者/模型</th>
              <th class="sortable" data-sort="totalScore" data-i18n="totalScore">总分</th>
            </tr>
          </thead>
          <tbody id="overall-tbody">
            <tr>
              <td colspan="100%" class="loading">
                <div class="spinner"></div>
                <p data-i18n="loading">加载中…</p>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="js/lang.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/scripts.js"></script>
  <script>
    document.getElementById('site-lang-zh').addEventListener('click', function(e) { e.preventDefault(); setSiteLang('zh'); });
    document.getElementById('site-lang-en').addEventListener('click', function(e) { e.preventDefault(); setSiteLang('en'); });
  </script>
</body>
</html>
