  <div class="problem-header">

      <div class="details">
        <div class="detail-item">
          <strong data-i18n="domain">领域</strong>

        </div>
        <div class="detail-item">
          <strong data-i18n="contributor">贡献者</strong>

        <button type="button" class="exp-tab-btn" data-exp="framework" data-i18n="expTabFramework">Framework 排行</button>

              <th class="sortable" data-sort="rank" data-i18n="rank">排名</th>

              <th class="sortable" data-sort="submittedAt" data-i18n="submittedAt">提交时间</th>
            </tr>

              <td colspan="4" class="loading">

    <!-- 本任务演化 Evolution (per task) -->
    <div class="content evo-chart-card problem-evolution-section" id="problem-evolution-section" style="display:none;">
      <h3 data-i18n="evolutionTitle">演化</h3>
      <div class="evo-chart-wrap">
        <canvas id="problem-evo-chart"></canvas>
      </div>
      <div class="evo-legend" id="problem-evo-legend"></div>
      <div class="no-data problem-evo-no-data" id="problem-evo-no-data" style="display:none;">

  <footer class="site-footer">

    </div>

  <script src="js/lang.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/taskDescriptions.js"></script>
  <script src="js/scripts.js"></script>
  <script>
    document.getElementById('site-lang-zh').addEventListener('click', function(e) { e.preventDefault(); setSiteLang('zh'); });
    document.getElementById('site-lang-en').addEventListener('click', function(e) { e.preventDefault(); setSiteLang('en'); });

    // Task-level Evolution chart (same style as home/evolution)
    var problemChartInstance = null;
    function buildTaskChartData(benchData, evolutionObj) {
      if (!evolutionObj || !benchData || !benchData.methods) return null;
      var methods = benchData.methods;
      return methods.map(function(m) {
        var series = evolutionObj[m.id];
        var data = Array.isArray(series) ? series.map(function(p) { return { x: p.step, y: p.score }; }) : [];
        return {
          label: m.name,
          data: data,
          borderColor: m.color || '#b8a060',
          backgroundColor: (m.color || '#b8a060') + '20',
          fill: false,
          tension: 0.3,
          pointRadius: 4,
          pointHoverRadius: 6
        };
      }).filter(function(d) { return d.data.length > 0; });
    }
    function drawTaskChart(benchData, evolutionObj) {
      var canvas = document.getElementById('problem-evo-chart');
      if (!canvas || !evolutionObj || !window.Chart) return;
      var datasets = buildTaskChartData(benchData, evolutionObj);
      if (!datasets || datasets.length === 0) return;
      if (problemChartInstance) {
        problemChartInstance.destroy();
        problemChartInstance = null;
      }
      var allSteps = new Set();
      Object.keys(evolutionObj).forEach(function(k) {
        var s = evolutionObj[k];
        if (Array.isArray(s)) s.forEach(function(p) { allSteps.add(p.step); });
      });
      var labels = Array.from(allSteps).sort(function(a, b) { return a - b; });
      var ctx = canvas.getContext('2d');
      problemChartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: datasets.map(function(d) {
            return {
              label: d.label,
              borderColor: d.borderColor,
              backgroundColor: d.backgroundColor,
              fill: d.fill,
              tension: d.tension,
              pointRadius: d.pointRadius,
              pointHoverRadius: d.pointHoverRadius,
              data: labels.map(function(step) {
                var pt = d.data.find(function(p) { return p.x === step; });
                return pt != null ? pt.y : null;
              })
            };
          })
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { intersect: false, mode: 'index' },
          plugins: { legend: { display: false } },
          scales: {
            x: {
              grid: { color: 'rgba(0, 0, 0, 0.06)' },
              ticks: { color: '#6e6e80', maxTicksLimit: 12, font: { family: 'Inter, Noto Sans SC, -apple-system, sans-serif' } }
            },
            y: {
              min: 0,
              max: 1,
              grid: { color: 'rgba(0, 0, 0, 0.06)' },
              ticks: {
                color: '#6e6e80',
                font: { family: 'Inter, Noto Sans SC, -apple-system, sans-serif' },
                callback: function(v) { return (v * 100).toFixed(0) + '%'; }
              }
            }
          }
        }
      });
    }
    function renderTaskLegend(benchData, evolutionObj) {
      var wrap = document.getElementById('problem-evo-legend');
      if (!wrap || !benchData || !benchData.methods || !evolutionObj) return;
      var methods = benchData.methods.filter(function(m) {
        var s = evolutionObj[m.id];
        return Array.isArray(s) && s.length > 0;
      });
      function escapeHtml(s) {
        if (s == null) return '';
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }
      wrap.innerHTML = methods.map(function(m) {
        return '<span><span class="dot" style="background:' + (m.color || '#b8a060') + '"></span>' + escapeHtml(m.name) + '</span>';
      }).join('');
    }
    function loadTaskEvolution(taskName) {
      var section = document.getElementById('problem-evolution-section');
      var noDataEl = document.getElementById('problem-evo-no-data');
      var chartWrap = section ? section.querySelector('.evo-chart-wrap') : null;
      var legendEl = document.getElementById('problem-evo-legend');
      if (!taskName || !section) return;
      fetch('data/bench_evolution.json')
        .then(function(r) { return r.ok ? r.json() : null; })
        .catch(function() { return null; })
        .then(function(data) {
          if (!data || !data.evolution || !data.evolution.by_task) {
            section.style.display = 'none';
            return;
          }
          var task = (data.tasks || []).find(function(t) {
            return (t.name || '') === taskName || (t.id || '') === taskName;
          });
          var taskId = task ? task.id : taskName.replace(/\s+/g, '_').toLowerCase();
          var evolutionObj = data.evolution.by_task[taskId];
          if (!evolutionObj) {
            section.style.display = 'none';
            return;
          }
          var hasAny = Object.keys(evolutionObj).some(function(k) {
            var s = evolutionObj[k];
            return Array.isArray(s) && s.length > 0;
          });
          if (!hasAny) {
            if (chartWrap) chartWrap.style.display = 'none';
            if (legendEl) legendEl.style.display = 'none';
            if (noDataEl) { noDataEl.style.display = 'flex'; noDataEl.classList.add('no-data'); }
            section.style.display = 'block';
            return;
          }
          section.style.display = 'block';
          if (noDataEl) noDataEl.style.display = 'none';
          if (chartWrap) chartWrap.style.display = 'block';
          if (legendEl) legendEl.style.display = 'flex';
          drawTaskChart(data, evolutionObj);
          renderTaskLegend(data, evolutionObj);
        })
        .catch(function() { section.style.display = 'none'; });
    }
    window.loadTaskEvolution = loadTaskEvolution;
  </script>
</body>
</html>
