<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <title>Frontier-Engineering Bench · Overall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/tables.css">
</head>
<body>
  <nav>
    <div class="container nav-inner">
      <a href="index.html" class="nav-brand-wrap">
        <span class="nav-brand">Frontier-Engineering Bench</span>
        <span class="nav-tagline" data-i18n="navLeaderboard">Leaderboard</span>
      </a>
      <div class="nav-right">
        <ul>
          <li><a href="index.html" data-i18n="navHome">Home</a></li>
          <li><a href="index.html#overall-section" data-i18n="navOverall">Overall</a></li>
          <li><a href="problem.html?id=1" data-i18n="navTasks">Tasks</a></li>
          <li><a href="contact.html" data-i18n="navContact">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="content">
      <h1 data-i18n="overallTitle">Overall Leaderboard</h1>
      <div class="exp-tabs" id="exp-tabs-overall">
        <button type="button" class="exp-tab-btn active" data-exp="model" data-i18n="expTabModel">Model Leaderboard</button>
        <button type="button" class="exp-tab-btn" data-exp="framework" data-i18n="expTabFramework">Framework Leaderboard</button>
      </div>
      <p id="overall-desc" data-i18n="overallDesc">Displaying comprehensive scores of all participants/models across all tasks</p>
    </div>

    <div class="content">
      <div class="table-container">
        <table id="overall-table">
          <thead>
            <tr>
              <th class="sortable" data-sort="rank" data-i18n="rank">Rank</th>
              <th class="sortable" data-sort="name" data-i18n="participant">Participant/Model</th>
              <th class="sortable" data-sort="totalScore" data-i18n="totalScore">Total Score</th>
            </tr>
          </thead>
          <tbody id="overall-tbody">
            <tr>
              <td colspan="100%" class="loading">
                <div class="spinner"></div>
                <p data-i18n="loading">Loading…</p>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <span>© 2026 einsia Lab</span>
      <a href="https://github.com/Einsia" target="_blank" rel="noopener">GitHub</a>
    </div>
  </footer>

  <script src="js/lang.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/scripts.js"></script>
</body>
</html>
